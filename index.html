<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Taxas de Entrega</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>🛵 Calculadora de Taxas de Entrega</h1>
    </header>

    <div class="container" id="app"></div>

    <!-- Feedback Visual para Voz -->
    <div class="voice-feedback" id="voiceFeedback">
        <div class="feedback-text" id="feedbackText">Ouvindo...</div>
        <div class="feedback-options" id="feedbackOptions"></div>
    </div>

    <!-- Modal Histórico -->
    <div id="historicoModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="fecharHistorico()">&times;</span>
            <h2>📋 Bairros Adicionados (Ordem de Adição)</h2>
            <div id="historicoLista" class="historico-lista"></div>
        </div>
    </div>

    <!-- Barra Inferior -->
    <div class="bottom-bar">
        <div class="total-display">
            <span class="total-label">Total:</span>
            <span class="total-info">
                R$ <span id="total-amount" class="total-amount">0,00</span>
                <span class="bairros-count">(<span id="bairros-count">0</span> bairros)</span>
            </span>
        </div>
        <div class="bottom-buttons">
            <button class="btn-action btn-collapse" onclick="recolherTudo()">
                📏 Recolher
            </button>
            <button class="btn-action btn-history" onclick="mostrarHistorico()">
                📋 Histórico
            </button>
            <button class="btn-action btn-export" onclick="exportarDados()">
                📤 Exportar
            </button>
            <button class="btn-action btn-reset" onclick="resetarTudo()">
                ❌ Limpar
            </button>
            <button class="btn-action btn-voice" onclick="iniciarReconhecimentoVoz()" id="btnVoz">
                🎤 Voz
            </button>
        </div>
    </div>

    <!-- Toast de Notificação -->
    <div class="toast" id="toast">
        <span id="toast-message">Copiado!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
